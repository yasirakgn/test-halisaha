<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Video Oynatıcı</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
    #err { color: #fff; font-family: sans-serif; font-size: 14px; padding: 20px; text-align: center; margin-top: 40px; }
  </style>
</head>
<body>
  <iframe
    id="player"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen"
    allowfullscreen
    referrerpolicy="strict-origin-when-cross-origin"
  ></iframe>

  <script>
    const u = new URL(location.href);
    let v = u.searchParams.get('v') || '';

    // Eğer v parametresi tam bir YouTube URL'si ise ID'yi çıkar
    if (v && v.length > 11) {
      // watch?v=ID
      if (v.includes('v=')) {
        v = v.split('v=')[1].split('&')[0].split('?')[0];
      }
      // youtu.be/ID
      else if (v.includes('youtu.be/')) {
        v = v.split('youtu.be/')[1].split('?')[0].split('/')[0];
      }
      // /embed/ID
      else if (v.includes('/embed/')) {
        v = v.split('/embed/')[1].split('?')[0].split('/')[0];
      }
      // /live/ID
      else if (v.includes('/live/')) {
        v = v.split('/live/')[1].split('?')[0].split('/')[0];
      }
    }

    // Video ID kontrolü: 11 karakter, sadece harf/rakam/-/_
    const isValidId = v && /^[A-Za-z0-9_-]{11}$/.test(v.trim());
    const player = document.getElementById('player');

    if (!isValidId) {
      player.remove();
      document.body.innerHTML = '<div id="err">⚠️ Geçerli bir Video ID bulunamadı.<br><small style="opacity:.6">?v=' + (v || '(boş)') + '</small></div>';
    } else {
      v = v.trim();
      const base   = 'https://www.youtube-nocookie.com/embed/' + encodeURIComponent(v);
      const params = new URLSearchParams({
        enablejsapi:    '1',
        rel:            '0',
        modestbranding: '1',
        playsinline:    u.searchParams.get('playsinline') || '1',
        autoplay:       u.searchParams.get('autoplay')    || '0',
        origin:         location.origin
      });
      player.src = `${base}?${params}`;
    }
  </script>
</body>
</html>
